<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor - AI Code Review Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            height: 100vh;
            overflow: hidden;
        }

        /* Visible scrollbars - not blending with UI */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-left: 1px solid #3e3e42;
        }

        ::-webkit-scrollbar-thumb {
            background: #4e4e50;
            border-radius: 6px;
            border: 2px solid #1e1e1e;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5e5e60;
        }

        ::-webkit-scrollbar-thumb:active {
            background: #6e6e70;
        }

        /* For Firefox */
        * {
            scrollbar-width: auto;
            scrollbar-color: #4e4e50 #1e1e1e;
        }

        /* Top Bar */
        .top-bar {
            background: #252526;
            height: 35px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #3e3e42;
            justify-content: space-between;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #cccccc;
        }

        .breadcrumb-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .top-actions {
            display: flex;
            gap: 8px;
        }

        .top-btn {
            background: transparent;
            border: 1px solid #3e3e42;
            color: #cccccc;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .top-btn:hover {
            background: #3e3e42;
        }

        /* Main Container */
        .container {
            display: flex;
            height: calc(100vh - 35px);
        }

        /* File Explorer */
        .file-explorer {
            width: 250px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .explorer-header {
            padding: 8px 12px;
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: #252526;
            border-bottom: 1px solid #3e3e42;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .folder {
            user-select: none;
        }

        .folder-header {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }

        .folder-header:hover {
            background: #2a2d2e;
        }

        .folder-icon {
            margin-right: 6px;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .folder.expanded .folder-icon {
            transform: rotate(90deg);
        }

        .folder-content {
            display: none;
            padding-left: 16px;
        }

        .folder.expanded .folder-content {
            display: block;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }

        .file-item:hover {
            background: #2a2d2e;
        }

        .file-item.active {
            background: #37373d;
        }

        .file-item-icon {
            margin-right: 6px;
            font-size: 14px;
        }

        /* Resize Handle */
        .resize-handle {
            width: 4px;
            background: transparent;
            cursor: col-resize;
            position: relative;
            transition: background 0.2s;
        }

        .resize-handle:hover {
            background: #007acc;
        }

        .resize-handle:active {
            background: #007acc;
        }

        /* Editor Panel */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        .editor-tabs {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            align-items: center;
            min-height: 35px;
            padding: 0 8px;
        }

        .editor-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: transparent;
            border: none;
            color: #969696;
            cursor: pointer;
            font-size: 13px;
            border-right: 1px solid #3e3e42;
            transition: all 0.2s;
        }

        .editor-tab.active {
            background: #1e1e1e;
            color: #ffffff;
        }

        .editor-tab:hover {
            color: #ffffff;
        }

        .editor-container {
            flex: 1;
            position: relative;
        }

        #monaco-editor {
            width: 100%;
            height: 100%;
        }

        .empty-editor {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6a6a6a;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        /* Chatbot Panel */
        .chat-panel {
            width: 350px;
            background: #252526;
            border-left: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 8px 12px;
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .chat-message.user {
            background: #094771;
            align-self: flex-end;
            max-width: 85%;
        }

        .chat-message.assistant {
            background: #2d2d30;
            align-self: flex-start;
            max-width: 85%;
        }

        .chat-message.system {
            background: #3e3e42;
            font-size: 12px;
            color: #888888;
            text-align: center;
            align-self: center;
        }

        .chat-input-container {
            padding: 12px;
            border-top: 1px solid #3e3e42;
            background: #252526;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #cccccc;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #007acc;
        }

        .chat-send-btn {
            background: #007acc;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .chat-send-btn:hover {
            background: #005a9e;
        }

        .chat-send-btn:disabled {
            background: #3e3e42;
            cursor: not-allowed;
        }

        /* Status Bar */
        .status-bar {
            background: #007acc;
            color: white;
            padding: 4px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Loading */
        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #007acc;
            font-size: 14px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #3e3e42;
            border-top-color: #007acc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive text sizing for chatbot */
        @media (max-width: 1400px) {
            .chat-message {
                font-size: 13px;
                padding: 10px;
            }
        }

        @media (max-width: 1200px) {
            .chat-message {
                font-size: 12px;
                padding: 8px;
            }
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="breadcrumb">
            <div class="breadcrumb-item">
                <span>📁</span>
                <span id="project-name">AI Code Review</span>
            </div>
            <span>›</span>
            <div class="breadcrumb-item">
                <span>src</span>
            </div>
            <span>›</span>
            <div class="breadcrumb-item">
                <span id="current-file-name">app.ts</span>
            </div>
        </div>
        <div class="top-actions">
            <button class="top-btn" id="edit-btn" onclick="toggleEditMode()">✏️ Edit</button>
            <button class="top-btn" onclick="window.location.href='/'">🏠 Home</button>
            <button class="top-btn" id="dashboard-btn">📊 Dashboard</button>
            <button class="top-btn" onclick="window.location.href='{{ url_for('auth.logout') }}'">🚪 Logout</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- File Explorer -->
        <div class="file-explorer" id="file-explorer">
            <div class="explorer-header">EXPLORER</div>
            <div class="file-tree" id="file-tree">
                <!-- File tree will be populated by JavaScript -->
            </div>
        </div>

        <!-- Resize Handle -->
        <div class="resize-handle" id="explorer-resize"></div>

        <!-- Editor Panel -->
        <div class="editor-panel">
            <div class="editor-tabs">
                <div class="editor-tab active" id="editor-tab">
                    <span id="tab-file-name">Select a file</span>
                </div>
            </div>
            <div class="editor-container">
                <div id="monaco-editor"></div>
                <div class="empty-editor" id="empty-editor">
                    <div class="empty-icon">📝</div>
                    <h3>No file selected</h3>
                    <p>Select a file from the explorer to start editing</p>
                </div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- Resize Handle -->
        <div class="resize-handle" id="chat-resize"></div>

        <!-- Chatbot Panel -->
        <div class="chat-panel" id="chat-panel">
            <div class="chat-header">
                <span>REVIEW ASSISTANT</span>
                <span id="chat-status">●</span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-message system">
                    AI Assistant ready to help with code review
                </div>
            </div>
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea class="chat-input" id="chat-input" placeholder="Ask about this code..."
                        rows="1"></textarea>
                    <button class="chat-send-btn" id="chat-send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">
        <div class="status-item">
            <span>⏳</span>
            <span id="status-text">Analyzing code...</span>
        </div>
    </div>

    <!-- Monaco Editor Loader -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

    <script>
        const uid = "{{ uid }}";
        const fileTree = {{ file_tree | tojson | safe }};
        let editor = null;
        let currentFilePath = null;
        let isEditMode = false;
        let currentDecorations = [];

        // Initialize Monaco Editor
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: '',
                language: 'python',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                lineNumbers: 'on',
                minimap: { enabled: true },
                scrollBeyondLastLine: false,
                renderWhitespace: 'selection',
                tabSize: 4,
                readOnly: true  // Start in read-only mode
            });

            document.getElementById('monaco-editor').style.display = 'none';
        });

        // Populate file tree
        function populateFileTree() {
            const treeContainer = document.getElementById('file-tree');

            if (!fileTree || fileTree.length === 0) {
                treeContainer.innerHTML = '<div style="padding: 12px; color: #6a6a6a;">No files found</div>';
                return;
            }

            // Group files by directory
            const structure = {};
            fileTree.forEach(item => {
                const parts = item.path.split('/');
                let current = structure;

                parts.forEach((part, index) => {
                    if (index === parts.length - 1) {
                        // It's a file
                        if (!current._files) current._files = [];
                        current._files.push({ name: part, path: item.path });
                    } else {
                        // It's a folder
                        if (!current[part]) current[part] = {};
                        current = current[part];
                    }
                });
            });

            function renderTree(obj, container, level = 0) {
                for (const key in obj) {
                    if (key === '_files') {
                        obj[key].forEach(file => {
                            const fileDiv = document.createElement('div');
                            fileDiv.className = 'file-item';
                            fileDiv.innerHTML = `<span class="file-item-icon">${getFileIcon(file.name)}</span><span>${file.name}</span>`;
                            fileDiv.onclick = () => loadFile(file.path);
                            container.appendChild(fileDiv);
                        });
                    } else {
                        const folderDiv = document.createElement('div');
                        folderDiv.className = 'folder';

                        const folderHeader = document.createElement('div');
                        folderHeader.className = 'folder-header';
                        folderHeader.innerHTML = `<span class="folder-icon">▶</span><span>📁 ${key}</span>`;

                        const folderContent = document.createElement('div');
                        folderContent.className = 'folder-content';

                        folderHeader.onclick = () => {
                            folderDiv.classList.toggle('expanded');
                        };

                        folderDiv.appendChild(folderHeader);
                        folderDiv.appendChild(folderContent);
                        container.appendChild(folderDiv);

                        renderTree(obj[key], folderContent, level + 1);
                    }
                }
            }

            renderTree(structure, treeContainer);
        }

        // Get file icon
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'py': '🐍', 'js': '📜', 'ts': '📘', 'java': '☕',
                'cpp': '⚙️', 'c': '⚙️', 'html': '🌐', 'css': '🎨',
                'json': '📋', 'md': '📝', 'txt': '📄'
            };
            return icons[ext] || '📄';
        }

        // Toggle edit mode
        function toggleEditMode() {
            isEditMode = !isEditMode;
            editor.updateOptions({ readOnly: !isEditMode });

            const editBtn = document.getElementById('edit-btn');
            if (isEditMode) {
                editBtn.textContent = '🔒 Read Only';
                editBtn.style.background = '#10b981';
            } else {
                editBtn.textContent = '✏️ Edit';
                editBtn.style.background = 'transparent';
            }
        }

        // Load file issues from backend
        async function loadFileIssues(filepath) {
            try {
                const response = await fetch(`/api/file/issues/${uid}/${filepath}`);
                const data = await response.json();

                if (data.issues && data.issues.length > 0) {
                    highlightIssues(data.issues);
                    console.log(`Highlighted ${data.issues.length} issues in ${filepath}`);
                } else {
                    console.log(`No issues found for ${filepath}`);
                }
            } catch (error) {
                console.error('Error loading file issues:', error);
            }
        }

        // Highlight issues in the editor
        function highlightIssues(issues) {
            // Clear previous decorations
            currentDecorations = editor.deltaDecorations(currentDecorations, []);

            const decorations = [];

            issues.forEach(issue => {
                const lineNumber = issue.line_number || 1;
                const severity = issue.severity || 'LOW';

                // Define colors based on severity
                const severityColors = {
                    'CRITICAL': '#ff0000',
                    'HIGH': '#ff8000',
                    'MEDIUM': '#ffff00',
                    'LOW': '#0080ff',
                    'UNKNOWN': '#808080'
                };

                const color = severityColors[severity] || severityColors['UNKNOWN'];

                // Create hover message
                const hoverMessage = [
                    `**${severity}**: ${issue.title}`,
                    '',
                    issue.description || '',
                    issue.remediation ? `\n**Remediation**: ${issue.remediation}` : ''
                ].filter(Boolean).join('\n');

                // Add line decoration - only gutter marker
                decorations.push({
                    range: new monaco.Range(lineNumber, 1, lineNumber, 1),
                    options: {
                        isWholeLine: false,
                        glyphMarginClassName: `issue-glyph-${severity.toLowerCase()}`,
                        glyphMarginHoverMessage: { value: hoverMessage },
                        linesDecorationsClassName: `issue-decoration-${severity.toLowerCase()}`
                    }
                });
            });

            // Apply decorations
            currentDecorations = editor.deltaDecorations([], decorations);
        }

        // Load file
        async function loadFile(filepath) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('empty-editor').style.display = 'none';

            try {
                const response = await fetch(`/api/file/content/${uid}/${filepath}`);
                const data = await response.json();

                if (data.error) {
                    alert('Error loading file: ' + data.error);
                    return;
                }

                currentFilePath = filepath;
                document.getElementById('current-file-name').textContent = filepath.split('/').pop();
                document.getElementById('tab-file-name').textContent = filepath.split('/').pop();

                // Show editor
                document.getElementById('monaco-editor').style.display = 'block';
                editor.setValue(data.content);
                monaco.editor.setModelLanguage(editor.getModel(), data.language || 'plaintext');

                // Load and highlight security issues
                await loadFileIssues(filepath);

                // Mark file as active
                document.querySelectorAll('.file-item').forEach(item => item.classList.remove('active'));
                event.target.closest('.file-item')?.classList.add('active');

            } catch (error) {
                console.error('Error loading file:', error);
                alert('Failed to load file');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Send chat message
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message) return;

            // Add user message
            addChatMessage(message, 'user');
            input.value = '';

            // Simulate AI response (replace with actual API call)
            setTimeout(() => {
                addChatMessage('Let me analyze that for you...', 'assistant');
            }, 500);
        }

        // Add chat message
        function addChatMessage(text, type) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${type}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            adjustChatbotText();
        }

        // Adjust chatbot text based on panel width
        function adjustChatbotText() {
            const chatPanel = document.getElementById('chat-panel');
            const width = chatPanel.offsetWidth;

            let fontSize = 14;
            let padding = 12;

            if (width < 320) {
                fontSize = 11;
                padding = 8;
            } else if (width < 350) {
                fontSize = 12;
                padding = 10;
            } else if (width < 400) {
                fontSize = 13;
                padding = 11;
            } else if (width > 450) {
                fontSize = 15;
                padding = 13;
            }

            const messages = chatPanel.querySelectorAll('.chat-message');
            messages.forEach(msg => {
                msg.style.fontSize = fontSize + 'px';
                msg.style.padding = padding + 'px';
            });
        }

        // Initialize panel resizing
        function initResizePanels() {
            const explorerHandle = document.getElementById('explorer-resize');
            const chatHandle = document.getElementById('chat-resize');
            const fileExplorer = document.getElementById('file-explorer');
            const chatPanel = document.getElementById('chat-panel');

            let isResizing = false;
            let currentHandle = null;

            [explorerHandle, chatHandle].forEach(handle => {
                handle.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    currentHandle = handle;
                    document.body.style.cursor = 'col-resize';
                    e.preventDefault();
                });
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;

                if (currentHandle === explorerHandle) {
                    const newWidth = e.clientX;
                    if (newWidth >= 200 && newWidth <= 500) {
                        fileExplorer.style.width = newWidth + 'px';
                    }
                } else if (currentHandle === chatHandle) {
                    const newWidth = window.innerWidth - e.clientX;
                    if (newWidth >= 280 && newWidth <= 600) {
                        chatPanel.style.width = newWidth + 'px';
                        adjustChatbotText();
                    }
                }
            });

            document.addEventListener('mouseup', () => {
                isResizing = false;
                currentHandle = null;
                document.body.style.cursor = 'default';
            });
        }

        // Check analysis status
        async function checkAnalysisStatus() {
            try {
                const response = await fetch(`/api/analysis/status/${uid}`);
                const data = await response.json();

                const statusBar = document.getElementById('status-bar');
                const statusText = document.getElementById('status-text');
                const dashboardBtn = document.getElementById('dashboard-btn');

                if (data.status === 'complete') {
                    statusBar.style.background = '#10b981';
                    statusText.textContent = '✓ Analysis complete!';
                    dashboardBtn.disabled = false;
                    dashboardBtn.onclick = () => window.location.href = '/dashboard';
                    return false;
                } else if (data.status === 'error') {
                    statusBar.style.background = '#ef4444';
                    statusText.textContent = '✗ Analysis failed';
                    return false;
                } else {
                    statusText.textContent = 'Analyzing code...';
                    return true;
                }
            } catch (error) {
                console.error('Error checking status:', error);
                return true;
            }
        }

        // Poll status
        function startStatusPolling() {
            const poll = async () => {
                const shouldContinue = await checkAnalysisStatus();
                if (shouldContinue) {
                    setTimeout(poll, 3000);
                }
            };
            poll();
        }

        // Chat input auto-resize
        document.getElementById('chat-input').addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Enter to send
        document.getElementById('chat-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            populateFileTree();
            initResizePanels();
            startStatusPolling();
            adjustChatbotText();
        });
    </script>
</body>

</html>
