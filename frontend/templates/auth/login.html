<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AI Code Review</title>
  <meta name="description" content="Sign in to your AI Code Review account">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --v: #7C6FF7; --v2: #9d93ff; --v-dim: rgba(124,111,247,0.14);
      --v-glow: rgba(124,111,247,0.35); --bg: #07090f;
      --sf: rgba(255,255,255,0.04); --br: rgba(255,255,255,0.08);
      --t: #e2e8f4; --t2: #64748b; --t3: #1e293b;
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
      --head: 'Space Grotesk', sans-serif;
      --rad: 14px; --dur: 0.22s;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      overflow-y: auto;
      position: relative;
    }

    /* Ambient orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,111,247,0.2) 0%, transparent 70%); top: -150px; left: -150px; animation: drift 14s ease-in-out infinite alternate; }
    .orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%); bottom: -100px; right: -100px; animation: drift 10s ease-in-out infinite alternate-reverse; }
    .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(157,147,255,0.12) 0%, transparent 70%); bottom: 30%; left: 10%; animation: drift 8s ease-in-out infinite alternate; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(24px,16px); } }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: rgba(13,17,23,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 44px 40px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: 0 0 0 1px rgba(124,111,247,0.12), 0 28px 72px rgba(0,0,0,0.65), 0 0 100px rgba(124,111,247,0.05);
      animation: card-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes card-in { from { opacity:0; transform:translateY(28px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    /* Logo */
    .logo { text-align: center; margin-bottom: 34px; }
    .logo-icon {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, var(--v), #5b50e0);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 16px;
      box-shadow: 0 8px 28px var(--v-glow), 0 0 0 6px var(--v-dim);
    }
    .logo h1 {
      color: var(--t);
      font-size: 1.35rem;
      font-weight: 800;
      font-family: var(--head);
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .logo p { color: var(--t2); font-size: 0.84rem; }

    /* Alert */
    .alert { display: none; padding: 12px 15px; border-radius: 10px; font-size: 0.82rem; margin-bottom: 18px; font-weight: 500; }
    .alert-error   { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
    .alert-success { background: rgba(34,197,94,0.1); color: #86efac;  border: 1px solid rgba(34,197,94,0.25); }

    /* Fields */
    .field { margin-bottom: 16px; }
    .field label { display: block; color: rgba(255,255,255,0.6); font-size: 0.78rem; font-weight: 600; margin-bottom: 7px; letter-spacing: 0.2px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; opacity: 0.45; }
    .field input {
      width: 100%;
      padding: 12px 42px 12px 40px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 11px;
      color: var(--t);
      font-size: 0.88rem;
      font-family: var(--font);
      outline: none;
      transition: border-color var(--dur), background var(--dur), box-shadow var(--dur);
    }
    .field input::placeholder { color: rgba(255,255,255,0.22); }
    .field input:focus {
      border-color: rgba(124,111,247,0.6);
      background: rgba(124,111,247,0.05);
      box-shadow: 0 0 0 3px rgba(124,111,247,0.12);
    }

    .toggle-pwd {
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 15px; opacity: 0.4; transition: opacity 0.2s; padding: 4px;
    }
    .toggle-pwd:hover { opacity: 0.8; }

    .field-row { display: flex; justify-content: flex-end; margin-top: -6px; margin-bottom: 18px; }
    .field-row a { color: var(--v2); font-size: 0.78rem; text-decoration: none; transition: color 0.2s; }
    .field-row a:hover { color: #fff; text-decoration: underline; }

    /* Primary CTA */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--v) 0%, #5b50e0 100%);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: var(--font);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 22px var(--v-glow);
      letter-spacing: 0.1px;
      margin-top: 4px;
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 10px 30px var(--v-glow); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0; color: rgba(255,255,255,0.2);
      font-size: 0.7rem; letter-spacing: 0.8px; text-transform: uppercase;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }

    /* Social buttons */
    .social-btns { display: flex; flex-direction: column; gap: 9px; }
    .btn-social {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 11px 20px; border-radius: 11px;
      font-size: 0.85rem; font-weight: 600; font-family: var(--font);
      text-decoration: none; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: var(--t);
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
    }
    .btn-social:hover { background: rgba(255,255,255,0.08); transform: translateY(-1px); border-color: rgba(255,255,255,0.15); }
    .btn-github:hover  { border-color: rgba(255,255,255,0.25); }
    .btn-linkedin:hover { border-color: rgba(56,189,248,0.4); }

    /* Footer */
    .footer { text-align: center; margin-top: 26px; color: var(--t2); font-size: 0.82rem; }
    .footer a { color: var(--v2); text-decoration: none; font-weight: 600; transition: color 0.2s; }
    .footer a:hover { color: #fff; }

    /* Watermark grid */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(124,111,247,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(124,111,247,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <h1>Welcome back</h1>
      <p>Sign in to your AI Code Review account</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="login-form" onsubmit="handleLogin(event)" autocomplete="on">
      <div class="field">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="toggle-pwd" onclick="togglePwd('password', this)" tabindex="-1">👁</button>
        </div>
      </div>

      <div class="field-row">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">Sign In →</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="social-btns">
      <a href="{{ url_for('auth.github_login') }}" class="btn-social btn-github">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.137 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        Continue with GitHub
      </a>
      <a href="{{ url_for('auth.linkedin_login') }}" class="btn-social btn-linkedin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        Continue with LinkedIn
      </a>
    </div>

    <div class="footer">
      Don't have an account? <a href="{{ url_for('auth.register_page') }}">Create one →</a>
    </div>
  </div>

  <script>
    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.className = `alert alert-${type}`;
      el.textContent = type === 'error' ? '❌ ' + msg : '✅ ' + msg;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function togglePwd(id, btn) {
      const f = document.getElementById(id);
      f.type = f.type === 'password' ? 'text' : 'password';
      btn.textContent = f.type === 'password' ? '👁' : '🙈';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();
        if (!resp.ok) { showAlert(data.error || 'Login failed. Please check your credentials.'); return; }
        localStorage.setItem('access_token',  data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        await fetch('/auth/set-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ access_token: data.access_token, refresh_token: data.refresh_token })
        });
        showAlert('Signed in! Redirecting…', 'success');
        setTimeout(() => window.location.href = '/', 700);
      } catch { showAlert('Network error — please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Sign In →'; }
    }
  </script>
</body>
</html>
