<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AI Code Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #25343F 0%, #2d3e4f 50%, #354555 100%);
            background-attachment: fixed;
            padding: 40px 24px;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        /* Animated background orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 155, 81, 0.4), transparent);
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(191, 201, 209, 0.25), transparent);
            bottom: -80px;
            right: -80px;
            animation-delay: -4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(30px) scale(1.05);
            }
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #FF9B51, #ff8a38);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(255, 155, 81, 0.4);
        }

        .logo h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 4px;
        }

        /* Alert */
        .alert {
            display: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13.5px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        /* Form */
        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
            opacity: 0.6;
        }

        .field input {
            width: 100%;
            padding: 13px 44px 13px 42px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 14.5px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .field input:focus {
            border-color: rgba(255, 155, 81, 0.7);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(255, 155, 81, 0.15);
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .toggle-btn:hover {
            opacity: 0.9;
        }

        .field-row {
            display: flex;
            justify-content: flex-end;
            margin-top: -8px;
            margin-bottom: 20px;
        }

        .field-row a {
            color: rgba(255, 155, 81, 0.9);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .field-row a:hover {
            color: #FF9B51;
            text-decoration: underline;
        }

        /* Primary CTA */
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF9B51 0%, #ff8a38 100%);
            color: #25343F;
            font-size: 15.5px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 8px 24px rgba(255, 155, 81, 0.35);
            letter-spacing: 0.2px;
            margin-top: 6px;
        }

        .btn-primary:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 12px 32px rgba(255, 155, 81, 0.45);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Social buttons */
        .social-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-social:hover {
            transform: translateY(-1px);
        }

        .btn-github {
            background: rgba(36, 41, 46, 0.8);
            color: #fff;
        }

        .btn-github:hover {
            background: rgba(36, 41, 46, 1);
        }

        .btn-linkedin {
            background: rgba(45, 62, 79, 0.9);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-linkedin:hover {
            background: rgba(55, 75, 95, 1);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 28px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13.5px;
        }

        .footer a {
            color: rgba(255, 155, 81, 0.9);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            color: #FF9B51;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔍</div>
            <h1>Welcome back</h1>
            <p>Sign in to your AI Code Review account</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="login-form" onsubmit="handleLogin(event)" autocomplete="on">
            <div class="field">
                <label for="email">Email address</label>
                <div class="input-wrap">
                    <span class="icon">✉️</span>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="email">
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        autocomplete="current-password">
                    <button type="button" class="toggle-btn" onclick="togglePwd('password', this)"
                        tabindex="-1">👁</button>
                </div>
            </div>

            <div class="field-row">
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">Sign In →</button>
        </form>

        <div class="divider">OR CONTINUE WITH</div>

        <div class="social-btns">
            <a href="{{ url_for('auth.github_login') }}" class="btn-social btn-github">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path
                        d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.137 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
                </svg>
                Continue with GitHub
            </a>
            <a href="{{ url_for('auth.linkedin_login') }}" class="btn-social btn-linkedin">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path
                        d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                </svg>
                Continue with LinkedIn
            </a>
        </div>

        <div class="footer">
            Don't have an account? <a href="{{ url_for('auth.register_page') }}">Create one →</a>
        </div>
    </div>

    <script>
        function showAlert(msg, type = 'error') {
            const el = document.getElementById('alert');
            el.className = `alert alert-${type}`;
            el.textContent = msg;
            el.style.display = 'block';
            el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function togglePwd(id, btn) {
            const f = document.getElementById(id);
            f.type = f.type === 'password' ? 'text' : 'password';
            btn.textContent = f.type === 'password' ? '👁' : '🙈';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Signing in…';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const resp = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();

                if (!resp.ok) {
                    showAlert(data.error || 'Login failed. Please check your credentials.');
                    return;
                }

                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);

                await fetch('/auth/set-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: data.access_token, refresh_token: data.refresh_token })
                });

                showAlert('Signed in! Redirecting…', 'success');
                setTimeout(() => window.location.href = '/', 700);
            } catch {
                showAlert('Network error — please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In →';
            }
        }
    </script>
</body>

</html>
