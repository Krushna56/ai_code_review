<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyzing Code — AI Code Review</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/loader.css') }}">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a2332 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e6edf3;
    }

    .card {
      background: rgba(22, 27, 34, 0.85);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 90%;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* ── EVA Loader (falls back if loader.css loads ok) ── */
    .loader {
      margin-bottom: 2rem;
    }

    /* Fallback spinner when loader.css is absent */
    .spinner-fallback {
      display: none;
      width: 64px;
      height: 64px;
      border: 4px solid rgba(255, 155, 81, 0.2);
      border-top-color: #FF9B51;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 2rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #FF9B51, #ffd6b0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #8b949e;
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }

    /* Progress bar */
    .progress-wrap {
      background: rgba(48, 54, 61, 0.6);
      border-radius: 0.5rem;
      height: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FF9B51, #ffd6b0);
      border-radius: 0.5rem;
      transition: width 0.4s ease;
    }

    .status-text {
      font-size: 0.82rem;
      color: #8b949e;
      min-height: 1.2em;
    }

    .error-box {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 0.75rem;
      color: #fca5a5;
      font-size: 0.85rem;
    }

    .btn-home {
      display: none;
      margin-top: 1.25rem;
      padding: 0.6rem 1.5rem;
      background: linear-gradient(135deg, #FF9B51, #ff8a38);
      color: #25343F;
      font-weight: 600;
      border: none;
      border-radius: 0.6rem;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.9rem;
    }

    /* Animated dots */
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% {
        content: '';
      }

      25% {
        content: '.';
      }

      50% {
        content: '..';
      }

      75% {
        content: '...';
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <!-- EVA Loader (from loader.css) -->
    <div class="loader" id="evaLoader">
      <div class="modelViewPort">
        <div class="eva">
          <div class="head">
            <div class="eyeChamber">
              <div class="eye"></div>
              <div class="eye"></div>
            </div>
          </div>
          <div class="body">
            <div class="hand"></div>
            <div class="hand"></div>
            <div class="scannerThing"></div>
            <div class="scannerOrigin"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Fallback spinner shown if EVA loader fails -->
    <div class="spinner-fallback" id="spinnerFallback"></div>

    <h2>Analyzing Your Code<span class="dots"></span></h2>
    <p class="subtitle" id="subtitleText">Cloning &amp; scanning your repository for vulnerabilities and code quality
      issues</p>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="status-text" id="statusText">Starting analysis…</p>

    <div class="error-box" id="errorBox"></div>
    <a class="btn-home" id="btnHome" href="/">← Back to Home</a>
  </div>

  <script>
    const uid = '{{ uid }}';
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const errorBox = document.getElementById('errorBox');
    const btnHome = document.getElementById('btnHome');

    let fakeProgress = 0;

    // Animate a fake progress bar that crawls to 90% while we wait
    function advanceFake() {
      if (fakeProgress < 88) {
        fakeProgress += Math.random() * 3 + 0.5;
        progressBar.style.width = Math.min(fakeProgress, 88) + '%';
      }
    }
    const fakeTick = setInterval(advanceFake, 600);

    function showError(msg) {
      clearInterval(fakeTick);
      errorBox.textContent = '❌ ' + msg;
      errorBox.style.display = 'block';
      btnHome.style.display = 'inline-block';
      statusText.textContent = 'Analysis could not be completed.';
      progressBar.style.background = '#ef4444';
    }

    function checkStatus() {
      fetch('/api/analysis/status/' + uid, { credentials: 'same-origin' })
        .then(r => r.json())
        .then(data => {
          if (data.status === 'complete') {
            clearInterval(fakeTick);
            progressBar.style.width = '100%';
            statusText.textContent = '✅ Analysis complete! Redirecting…';
            setTimeout(() => { window.location.href = '/chat?uid=' + uid; }, 800);
          } else if (data.status === 'error') {
            showError(data.error || 'Unknown error during analysis');
          } else {
            // Still running — use server progress if available
            if (data.progress && data.progress > fakeProgress) {
              fakeProgress = data.progress;
              progressBar.style.width = fakeProgress + '%';
            }
            statusText.textContent = data.message || 'Analysis in progress…';
            setTimeout(checkStatus, 2000);
          }
        })
        .catch(() => {
          // Network hiccup — retry silently
          setTimeout(checkStatus, 3000);
        });
    }

    if (uid && uid !== 'None') {
      setTimeout(checkStatus, 1500);
    } else {
      showError('No analysis UID found. Please go back and try again.');
    }
  </script>
</body>

</html>
