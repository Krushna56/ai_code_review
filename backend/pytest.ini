[pytest]
# Pytest configuration for AI Code Review optimization tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests for individual modules
    integration: Integration tests combining multiple modules
    e2e: End-to-end workflow tests
    performance: Performance benchmarking tests
    slow: Slow-running tests to skip in fast CI/CD
    security: Security-related tests
    rate_limiting: Rate limiting functionality tests
    background_tasks: Background task manager tests
    llm: LLM-related tests
    chunking: Code chunking tests
    parallel: Parallel execution tests

# Test output verbosity
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Minimum Python version
minversion = 6.0

# Test paths
testpaths = 
    backend/tests

# Log configuration
log_cli = false
log_cli_level = INFO
log_file = backend/tests/pytest.log
log_file_level = DEBUG

# Coverage options (if using pytest-cov)
# --cov=backend
# --cov-report=html
# --cov-report=term-missing

# Timeout for tests (requires pytest-timeout)
# timeout = 300

# Ignore deprecation warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
